<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Carrinho resetado - Zauli's Coffee">
    <title>Resetar Carrinho - Zauli's Coffee</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Roboto', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #8B4513 0%, #D2691E 100%);
            color: #333;
        }
        
        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            text-align: center;
            max-width: 400px;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        h1 {
            color: #8B4513;
            margin-bottom: 20px;
            font-size: 1.8rem;
        }
        
        .icon {
            font-size: 60px;
            margin: 20px 0;
        }
        
        p {
            color: #555;
            margin-bottom: 15px;
            font-size: 1rem;
            line-height: 1.6;
        }
        
        .status {
            padding: 15px;
            border-radius: 5px;
            margin: 20px 0;
            font-weight: bold;
            background: #d4edda;
            color: #155724;
        }
        
        a {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 30px;
            background: #8B4513;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s ease, transform 0.2s ease;
            font-weight: 500;
        }
        
        a:hover {
            background: #D2691E;
            transform: translateY(-2px);
        }
        
        a:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔄 Carrinho Resetado</h1>
        <div class="icon">☕</div>
        <div class="status">
            <i class="fas fa-check-circle"></i> Carrinho zerado com sucesso!
        </div>
        <p>Seu carrinho foi completamente limpo e está pronto para novas compras.</p>
        <p id="countdown">Redirecionando em 3 segundos...</p>
        <a href="../index.html">Voltar ao site</a>
    </div>

    <script>
        // Resetar o carrinho
        localStorage.removeItem('carrinho');
        
        // Countdown
        let count = 3;
        const countdownEl = document.getElementById('countdown');
        
        const interval = setInterval(() => {
            count--;
            if (count > 0) {
                countdownEl.textContent = `Redirecionando em ${count} segundo${count > 1 ? 's' : ''}...`;
            } else {
                clearInterval(interval);
                window.location.href = '../index.html';
            }
        }, 1000);
    </script>
</body>

</body>
</html>
